apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-scholar-proxy
  namespace: semantic-scholar
  labels:
    app: semantic-scholar-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-scholar-proxy
  template:
    metadata:
      labels:
        app: semantic-scholar-proxy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: proxy
          image: ghcr.io/pbumbulis/semantic-scholar-proxy:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SEMANTIC_SCHOLAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: semantic-scholar-proxy
                  key: api-key
            - name: LISTEN_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
